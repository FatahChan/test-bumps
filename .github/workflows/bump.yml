name: "Bump Version"

on:
  push:
    branches:
      - "dev"
jobs:
  bump-version:
    name: "Bump Version on dev"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout source code"
        uses: "actions/checkout@v4"
        with:
          ref: ${{ github.ref }}
      - name: "Automated Version Bump"
        id: version-bump
        uses: "phips28/gh-action-bump-version@master"
        env:
          GITHUB_TOKEN: ${{ secrets.AUTO_BUMP_APP_SECRET }}
        with:
          skip-tag: "true"
          commit-message: "chore: Bump to v{{version}}"
