name: "Bump Version"

on:
  push:
    branches:
      - "dev"
jobs:
  bump-version:
    name: "Bump Version on dev"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: "Checkout source code"
        uses: "actions/checkout@v4"
        with:
          ssh-key: ${{secrets.AUTOMATIC_BUMP}}
      - name: "Automated Version Bump"
        id: version-bump
        uses: "phips28/gh-action-bump-version@master"
        with:
          skip-tag: "true"
          commit-message: "chore: Bump to v{{version}}"
